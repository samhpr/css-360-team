name: Frontend CI

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run unit tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    env:
      IMAGE_NAME: local-live
      IMAGE_TAG: latest
      IMAGE_LOCAL_TAG: local-live:ci
      SMOKE_PORT: 8000
      REGISTRY: ${{ vars.REGISTRY || secrets.REGISTRY }}
      DEPLOY_URL: ${{ vars.DEPLOY_URL || secrets.DEPLOY_URL }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image for smoke tests
        uses: docker/build-push-action@v4
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE_LOCAL_TAG }}

      - name: Run container smoke tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: |
          if [[ -z "${SUPABASE_URL}" || -z "${SUPABASE_SERVICE_ROLE_KEY}" ]]; then
            echo "Missing backend smoke-test secrets: SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY are required." >&2
            exit 1
          fi

          cleanup() {
            docker rm -f local-live-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          docker run -d \
            --name local-live-smoke \
            -p "${SMOKE_PORT}:8000" \
            -e SUPABASE_URL="${SUPABASE_URL}" \
            -e SUPABASE_SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY}" \
            -e TICKETMASTER_API_KEY="${TICKETMASTER_API_KEY}" \
            "${IMAGE_LOCAL_TAG}"

          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:${SMOKE_PORT}/health" >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS "http://127.0.0.1:${SMOKE_PORT}/health" >/dev/null
          curl -fsS "http://127.0.0.1:${SMOKE_PORT}/api/genres" >/dev/null
          curl -fsS "http://127.0.0.1:${SMOKE_PORT}/api/events" >/dev/null

      - name: Login to registry (if provided)
        if: ${{ env.REGISTRY != '' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Tag and push Docker image
        if: ${{ env.REGISTRY != '' && env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != '' }}
        run: |
          IMAGE_FULL_TAG="${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker tag "${IMAGE_LOCAL_TAG}" "${IMAGE_FULL_TAG}"
          docker push "${IMAGE_FULL_TAG}"

      - name: Verify deployed production URL (optional)
        if: ${{ env.DEPLOY_URL != '' }}
        run: |
          echo "Waiting for deployment at ${DEPLOY_URL}"
          for i in {1..30}; do
            if curl -fsS "${DEPLOY_URL}/health" >/dev/null; then
              echo "Deployment healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Deployment verification failed" >&2
          exit 1
