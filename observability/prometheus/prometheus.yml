# Prometheus scrape configuration for the local observability lab.
# Targets are addressed by their docker-compose service name on the shared
# obs-net network, so no host IPs or published ports are needed here.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus scraping itself -- handy as a sanity-check target.
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Host CPU / memory / disk / network metrics.
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # The Local Live API. prometheus-fastapi-instrumentator serves Prometheus
  # metrics at /metrics on the same port uvicorn listens on (8000).
  - job_name: "local-live-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
