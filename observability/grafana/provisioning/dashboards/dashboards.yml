# Tells Grafana to load any dashboard JSON found in the mounted dashboards dir.
# The JSON files themselves live in ./observability/grafana/dashboards, mounted
# into the container at /var/lib/grafana/dashboards.

apiVersion: 1

providers:
  - name: "local-live-dashboards"
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
